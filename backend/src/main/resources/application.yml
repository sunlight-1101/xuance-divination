server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/xuance_divination?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: ${MAIL_STARTTLS_ENABLE:true}
          ssl:
            enable: ${MAIL_SSL_ENABLE:false}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

ai:
  enabled: false
  base-url: https://api.openai.com/v1/chat/completions
  api-key:
  model: gpt-4o-mini
  temperature: 0.2
  max-tokens: 1800

mail:
  enabled: ${MAIL_ENABLED:false}

alipay:
  enabled: ${ALIPAY_ENABLED:false}
  gateway-url: ${ALIPAY_GATEWAY_URL:https://openapi.alipay.com/gateway.do}
  app-id: ${ALIPAY_APP_ID:}
  private-key: ${ALIPAY_PRIVATE_KEY:}
  alipay-public-key: ${ALIPAY_PUBLIC_KEY:}
  notify-url: ${ALIPAY_NOTIFY_URL:}
  return-url: ${ALIPAY_RETURN_URL:}
  sign-type: RSA2
  charset: utf-8
